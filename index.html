<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Flappy Body - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --game-bg: #70c5ce;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #222;
            font-family: 'Poppins', sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background-color: var(--game-bg);
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
            border-left: 4px solid #333;
            border-right: 4px solid #333;
        }
        .ui-screen {
            position: absolute;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            padding: 2rem;
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }
        .bungee { font-family: 'Bungee', cursive; }
        .btn-prime {
            background: #ffcc00;
            color: #333;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.2s;
            cursor: pointer;
            border: 4px solid #b38f00;
        }
        .btn-prime:active { transform: scale(0.95); }
        #score-tag {
            position: absolute;
            top: 20px;
            font-family: 'Bungee', cursive;
            font-size: 3rem;
            color: white;
            text-shadow: 3px 3px 0 #000;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-tag">0</div>

    <!-- Start Menu -->
    <div id="start-menu" class="ui-screen">
        <h1 class="bungee text-4xl mb-4 text-yellow-400">FLAPPY BODY</h1>
        <p class="mb-6 text-sm">"Sharir" se bacho aur record todo!</p>
        
        <div class="mb-6 text-left">
            <label class="block text-xs font-bold uppercase mb-1">Custom Player Image (URL):</label>
            <input type="text" id="custom-url" placeholder="Paste image link here..." 
                class="w-full bg-black/30 border border-white/30 rounded p-2 text-xs outline-none focus:border-yellow-400">
        </div>

        <button onclick="startGame()" class="btn-prime bungee">KHELO!</button>
        <p class="mt-4 text-[10px] opacity-70 italic">Tip: Space ya Touch se jump karein.</p>
    </div>

    <!-- Game Over Menu -->
    <div id="game-over" class="ui-screen hidden">
        <h2 class="bungee text-5xl mb-2 text-red-500">OUT!</h2>
        <div class="bg-black/20 p-4 rounded-xl mb-6">
            <p class="text-xl">Score: <span id="final-score" class="font-bold">0</span></p>
            <p class="text-xl">Best: <span id="high-score" class="font-bold text-yellow-400">0</span></p>
        </div>
        <button onclick="startGame()" class="btn-prime bungee">PHIR SE!</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    /** @type {HTMLCanvasElement} */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreTag = document.getElementById('score-tag');
    const startMenu = document.getElementById('start-menu');
    const gameOverMenu = document.getElementById('game-over');
    const customUrlInput = document.getElementById('custom-url');

    // --- Configuration ---
    const CONFIG = {
        gravity: 0.22,
        jumpStrength: -5,
        pipeSpeed: 3,
        pipeGap: 180,
        pipeFrequency: 1500, // ms
        birdX: 80
    };

    let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
    let score = 0;
    let highScore = localStorage.getItem('flappyBodyHigh') || 0;
    let animationFrame;
    let lastTime = 0;
    let pipeTimer = 0;

    // --- Assets ---
    const birdImg = new Image();
    const defaultBirdSVG = `data:image/svg+xml;base64,${btoa('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#FFD700" stroke="#000" stroke-width="5"/><circle cx="65" cy="40" r="8" fill="#fff"/><circle cx="68" cy="40" r="3" fill="#000"/><path d="M70 60 Q 90 60 90 70 Q 70 80 50 70" fill="#FF8C00" stroke="#000" stroke-width="2"/></svg>')}`;
    birdImg.src = defaultBirdSVG;

    // --- Classes ---
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 5 + 2;
            this.speedX = (Math.random() - 0.5) * 6;
            this.speedY = (Math.random() - 0.5) * 6;
            this.color = color;
            this.alpha = 1;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.alpha -= 0.02;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    class Bird {
        constructor() {
            this.reset();
            this.width = 45;
            this.height = 45;
        }
        reset() {
            this.y = canvas.height / 2;
            this.velocity = 0;
            this.rotation = 0;
        }
        update() {
            this.velocity += CONFIG.gravity;
            this.y += this.velocity;
            
            // Rotation based on velocity
            this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, this.velocity * 0.1));

            if (this.y + this.height > canvas.height) {
                this.y = canvas.height - this.height;
                return true; // Collision with floor
            }
            if (this.y < 0) {
                this.y = 0;
                this.velocity = 0;
            }
            return false;
        }
        draw() {
            ctx.save();
            ctx.translate(CONFIG.birdX + this.width / 2, this.y + this.height / 2);
            ctx.rotate(this.rotation);
            ctx.drawImage(birdImg, -this.width / 2, -this.height / 2, this.width, this.height);
            ctx.restore();
        }
        jump() {
            this.velocity = CONFIG.jumpStrength;
            createParticles(CONFIG.birdX + 10, this.y + this.height, '#ffffff');
            playSound('jump');
        }
    }

    class Pipe {
        constructor() {
            this.x = canvas.width;
            this.width = 70;
            this.passed = false;
            const minHeight = 100;
            const maxHeight = canvas.height - CONFIG.pipeGap - minHeight;
            this.topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
        }
        update() {
            this.x -= CONFIG.pipeSpeed;
        }
        draw() {
            // Draw Sarir (Body) Obstacle
            this.drawBody(this.x, 0, this.topHeight, true); // Top
            this.drawBody(this.x, this.topHeight + CONFIG.pipeGap, canvas.height - (this.topHeight + CONFIG.pipeGap), false); // Bottom
        }
        drawBody(x, y, h, isTop) {
            ctx.save();
            ctx.fillStyle = isTop ? '#8b4513' : '#2d3436';
            
            // Draw a simplified "Body" silhouette
            const centerX = x + this.width / 2;
            
            // Torso
            ctx.fillRect(x + 10, y, this.width - 20, h);
            
            // Head
            const headY = isTop ? y + h - 15 : y + 15;
            ctx.beginPath();
            ctx.arc(centerX, headY, 15, 0, Math.PI * 2);
            ctx.fill();

            // Muscles/Details
            ctx.strokeStyle = "rgba(0,0,0,0.2)";
            ctx.lineWidth = 3;
            ctx.strokeRect(x + 15, y, this.width - 30, h);
            
            ctx.restore();
        }
    }

    // --- State Variables ---
    let player = new Bird();
    let pipes = [];
    let particles = [];
    let clouds = [];

    // --- Audio System ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'jump') {
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'hit') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'point') {
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
    }

    // --- Core Game Logic ---
    function init() {
        canvas.width = Math.min(window.innerWidth, 450);
        canvas.height = window.innerHeight;
        
        // Generate initial clouds
        for(let i=0; i<5; i++) {
            clouds.push({
                x: Math.random() * canvas.width,
                y: Math.random() * (canvas.height/2),
                s: Math.random() * 0.5 + 0.2,
                w: Math.random() * 60 + 40
            });
        }
        
        requestAnimationFrame(gameLoop);
    }

    function createParticles(x, y, color) {
        for (let i = 0; i < 8; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function startGame() {
        // Handle custom image
        const url = customUrlInput.value.trim();
        if (url) {
            birdImg.src = url;
            birdImg.onerror = () => { birdImg.src = defaultBirdSVG; };
        } else {
            birdImg.src = defaultBirdSVG;
        }

        gameState = 'PLAYING';
        score = 0;
        scoreTag.innerText = "0";
        pipes = [];
        particles = [];
        player.reset();
        startMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
    }

    function endGame() {
        gameState = 'GAMEOVER';
        playSound('hit');
        createParticles(CONFIG.birdX + 20, player.y + 20, '#ff0000');
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('flappyBodyHigh', highScore);
        }

        document.getElementById('final-score').innerText = score;
        document.getElementById('high-score').innerText = highScore;
        gameOverMenu.classList.remove('hidden');
    }

    function gameLoop(timestamp) {
        const deltaTime = timestamp - lastTime;
        lastTime = timestamp;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Draw Background (Clouds)
        ctx.fillStyle = "white";
        clouds.forEach(c => {
            c.x -= c.s;
            if (c.x + c.w < 0) c.x = canvas.width + 20;
            ctx.beginPath();
            ctx.ellipse(c.x, c.y, c.w/2, 20, 0, 0, Math.PI*2);
            ctx.fill();
        });

        if (gameState === 'PLAYING') {
            // 2. Update Player
            if (player.update()) endGame();

            // 3. Pipes Logic
            pipeTimer += deltaTime;
            if (pipeTimer > CONFIG.pipeFrequency) {
                pipes.push(new Pipe());
                pipeTimer = 0;
            }

            pipes.forEach((pipe, index) => {
                pipe.update();
                
                // Collision
                if (
                    CONFIG.birdX + player.width > pipe.x &&
                    CONFIG.birdX < pipe.x + pipe.width &&
                    (player.y < pipe.topHeight || player.y + player.height > pipe.topHeight + CONFIG.pipeGap)
                ) {
                    endGame();
                }

                // Score
                if (!pipe.passed && pipe.x < CONFIG.birdX) {
                    score++;
                    pipe.passed = true;
                    scoreTag.innerText = score;
                    playSound('point');
                }

                if (pipe.x + pipe.width < 0) pipes.splice(index, 1);
                pipe.draw();
            });
        }

        // 4. Draw Player
        player.draw();

        // 5. Particles
        particles.forEach((p, i) => {
            p.update();
            p.draw();
            if (p.alpha <= 0) particles.splice(i, 1);
        });

        // 6. Floor
        ctx.fillStyle = "#2ecc71";
        ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
        ctx.fillStyle = "#27ae60";
        ctx.fillRect(0, canvas.height - 25, canvas.width, 5);

        requestAnimationFrame(gameLoop);
    }

    // --- Interaction ---
    function handleAction() {
        if (gameState === 'PLAYING') {
            player.jump();
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') handleAction();
    });
    canvas.addEventListener('mousedown', handleAction);
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleAction();
    });

    // Start everything
    init();

</script>
</body>
</html>
